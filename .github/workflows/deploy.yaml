name: Deploy Application Ai-assistance to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

        - name : Deploy Via SSH
          users : appleboy/ssh-action@v1.0.3
          with:
             host: ${{ secrets.SSH_HOST }}
             username: root
             key : ${{ secrets.SSH_KEY }}
             script :
                cd /home/ec2-user/github-actions
                git pull
                docker-compose up -d --build
